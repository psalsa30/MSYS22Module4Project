<style>
        body {
            background-color: #f5ede0;
            font-family: 'Lato', sans-serif;
        }
        .hero-unit {
            background: #6b0f1a;
            border-bottom: 2px solid #f5ede0;
            padding: 4rem 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            letter-spacing: .05em;
        }
        .hero-unit .tagline {
            font-style: italic;
            color: #f5ede0;
            font-size: 1.15rem;
        }
        .hero-unit .lead {
            color: rgba(245,237,224,.75);
            font-weight: 300;
            max-width: 520px;
            margin: 0 auto;
        }
        .btn-founder {
            border-color: #f5ede0;
            color: #f5ede0;
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            letter-spacing: .1em;
            padding: .45rem 1.4rem;
            transition: background .2s, color .2s;
        }
        .btn-founder:hover {
            background-color: #f5ede0;
            color: #6b0f1a;
        }
        footer {
            color: rgba(90,20,30,.5);
            font-size: .8rem;
            padding-bottom: 1rem;
        }
    </style>

</head>
<body>
    <div class="container-fluid hero-unit text-center text-white">
        <div class="container py-5">
            <h1 class="display-4 fw-bold">Happy Wines</h1>
            <p class="fs-5 fst-italic">
                Crafted by friends, bottled with love.
            </p>

            <div class="btn-group" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-founder">Paulo Salvador</button>
                <button type="button" class="btn btn-founder">Bianca Ong</button>
                <button type="button" class="btn btn-founder">Matt Capistrano</button>
                </div>
        </div>
     </div>
